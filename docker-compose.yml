name: personal-krypto-dashboard

services:
  krypto-dashboard:
    image: ${APP_IMAGE:-ghcr.io/felixdango/crypto-dashboard:latest}
    container_name: krypto-dashboard
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      DATABASE_PATH: /data/krypto.db
      BASE_CURRENCY: EUR
      PRICE_PROVIDER: coingecko
      PRICE_CACHE_TTL_SECONDS: '600'
      ALLOCATION_CONCENTRATION_WARNING_PERCENT: '70'
      PUBLIC_APP_NAME: Krypto Dashboard
      INTERNAL_CRON_SECRET: ${INTERNAL_CRON_SECRET:?Set INTERNAL_CRON_SECRET in .env}
    volumes:
      - krypto-data:/data
    networks:
      npm_proxy:
        aliases:
          - app
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  snapshot-cron:
    image: alpine:3.20
    container_name: krypto-dashboard-snapshot-cron
    restart: unless-stopped
    depends_on:
      krypto-dashboard:
        condition: service_healthy
    environment:
      INTERNAL_CRON_SECRET: ${INTERNAL_CRON_SECRET:?Set INTERNAL_CRON_SECRET in .env}
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        apk add --no-cache curl
        printf '%s\n' \
          "5 * * * * curl -fsS -X POST -H 'Authorization: Bearer $${INTERNAL_CRON_SECRET}' http://krypto-dashboard:3000/api/internal/snapshots/hourly >/proc/1/fd/1 2>/proc/1/fd/2" \
          "10 * * * * curl -fsS -X POST -H 'Authorization: Bearer $${INTERNAL_CRON_SECRET}' http://krypto-dashboard:3000/api/internal/analytics/health-check >/proc/1/fd/1 2>/proc/1/fd/2" \
          "20 * * * * curl -fsS -X POST -H 'Authorization: Bearer $${INTERNAL_CRON_SECRET}' http://krypto-dashboard:3000/api/internal/news/fetch >/proc/1/fd/1 2>/proc/1/fd/2" \
          "55 23 * * * curl -fsS -X POST -H 'Authorization: Bearer $${INTERNAL_CRON_SECRET}' http://krypto-dashboard:3000/api/internal/snapshots/daily >/proc/1/fd/1 2>/proc/1/fd/2" \
          > /etc/crontabs/root
        crond -f -l 8
    networks:
      - npm_proxy

networks:
  npm_proxy:
    external: true

volumes:
  krypto-data:
    name: krypto-dashboard-data
